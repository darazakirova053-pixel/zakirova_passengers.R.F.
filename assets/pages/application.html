<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Оформление заявки — Пассажирам.РФ</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="../../index.html">
          <img src="../../assets/img/logo.svg" alt="логотип" />
          Пассажирам.РФ
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="login.html">Вход</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="register.html">Регистрация</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Личный кабинет</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="application.html">Заявка</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="admin.html">Админ</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5" style="max-width: 600px">
      <h2 class="text-center mb-4">Оформление заявки</h2>
      <form id="applicationForm">
        <div class="mb-3">
          <label for="transport" class="form-label">Вид транспорта</label>
          <select class="form-select" id="transport" required>
            <option value="">Выберите...</option>
            <option>Автобус</option>
            <option>Электробус</option>
            <option>Трамвай</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="startDate" class="form-label"
            >Дата начала (ДД.ММ.ГГГГ)</label
          >
          <input
            type="text"
            class="form-control"
            id="startDate"
            placeholder="01.06.2026"
            required
          />
        </div>
        <div class="mb-3">
          <label for="payment" class="form-label">Способ оплаты</label>
          <select class="form-select" id="payment" required>
            <option value="">Выберите...</option>
            <option>Предоплата по QR-коду</option>
            <option>Оплата картой МИР</option>
            <option>Постоплата в офисе</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          Отправить заявку
        </button>
      </form>
      <p class="mt-3 text-center text-muted">
        После отправки заявка будет рассмотрена администратором
      </p>
    </div>

    <footer class="bg-dark text-white text-center py-4">
      <div class="container">
        <p class="mb-0 footer-text">
          &copy; 2026 Пассажирам.РФ. Все права защищены.
        </p>
        <p class="mb-0 footer-small">
          г. Москва, ул. Большая Ордынка, д. 15 | Телефон: +7 (495) 123-45-67
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
