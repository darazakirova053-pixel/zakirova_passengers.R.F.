<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — Пассажирам.РФ</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="../../index.html">
          <img src="../../assets/img/logo.svg" alt="логотип" />
          Пассажирам.РФ
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="login.html">Вход</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="register.html">Регистрация</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Личный кабинет</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="application.html">Заявка</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="admin.html">Админ</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 70vh"
    >
      <div class="card p-4 shadow" style="max-width: 400px; width: 100%">
        <h2 class="text-center mb-4">Вход</h2>
        <form id="loginForm">
          <div class="mb-3">
            <label for="login" class="form-label">Логин</label>
            <input
              type="text"
              class="form-control"
              id="login"
              placeholder="Введите логин"
              required
            />
            <div
              id="loginError"
              class="text-danger small mt-1"
              style="display: none"
            >
              Неверный логин
            </div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Пароль</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Введите пароль"
              required
            />
            <div
              id="passwordError"
              class="text-danger small mt-1"
              style="display: none"
            >
              Неверный пароль
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>
        <p class="text-center mt-3">
          <a href="register.html" class="text-decoration-none"
            >Ещё не зарегистрированы? Регистрация</a
          >
        </p>
      </div>
    </div>

    <footer class="bg-dark text-white text-center py-4">
      <div class="container">
        <p class="mb-0 footer-text">
          &copy; 2026 Пассажирам.РФ. Все права защищены.
        </p>
        <p class="mb-0 footer-small">
          г. Москва, ул. Большая Ордынка, д. 15 | Телефон: +7 (495) 123-45-67
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
