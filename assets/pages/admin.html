<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель — Пассажирам.РФ</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="../../index.html">
          <img src="../../assets/img/logo.svg" alt="логотип" />
          Пассажирам.РФ
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="login.html">Вход</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="register.html">Регистрация</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Личный кабинет</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="application.html">Заявка</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="admin.html">Админ</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-4">
      <h2 class="mb-4">Управление заявками</h2>

      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <input
            type="text"
            class="form-control"
            placeholder="Поиск по транспорту..."
            id="searchInput"
            onkeyup="searchApplications()"
          />
        </div>
        <div class="col-md-3">
          <input
            type="text"
            class="form-control"
            placeholder="Фильтр по транспорту"
            id="filterTransport"
          />
        </div>
        <div class="col-md-3">
          <select class="form-select" id="filterStatus">
            <option value="">Все статусы</option>
            <option value="Новая">Новая</option>
            <option value="Идет обучение">Идет обучение</option>
            <option value="Обучение завершено">Обучение завершено</option>
          </select>
        </div>
        <div class="col-md-3 d-flex gap-2">
          <button class="btn btn-primary flex-grow-1" onclick="applyFilters()">
            Применить
          </button>
          <button
            class="btn btn-outline-secondary"
            onclick="resetFilters()"
            title="Сбросить фильтры"
          >
            ↺
          </button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered table-hover" id="adminTable">
          <thead class="table-primary">
            <tr>
              <th onclick="sortTable(0)" style="cursor: pointer">
                # <span class="sort-icon">⇅</span>
              </th>
              <th onclick="sortTable(1)" style="cursor: pointer">
                Транспорт <span class="sort-icon">⇅</span>
              </th>
              <th onclick="sortTable(2)" style="cursor: pointer">
                Дата <span class="sort-icon">⇅</span>
              </th>
              <th onclick="sortTable(3)" style="cursor: pointer">
                Статус <span class="sort-icon">⇅</span>
              </th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Заявки будут вставляться через JS -->
          </tbody>
        </table>
      </div>

      <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center" id="paginationControls">
          <li class="page-item" id="prevPage">
            <a class="page-link" href="#" onclick="changePage(currentPage - 1)"
              >Назад</a
            >
          </li>
          <li class="page-item" id="page1">
            <a class="page-link" href="#" onclick="changePage(1)">1</a>
          </li>
          <li class="page-item" id="page2">
            <a class="page-link" href="#" onclick="changePage(2)">2</a>
          </li>
          <li class="page-item" id="page3">
            <a class="page-link" href="#" onclick="changePage(3)">3</a>
          </li>
          <li class="page-item" id="nextPage">
            <a class="page-link" href="#" onclick="changePage(currentPage + 1)"
              >Вперед</a
            >
          </li>
        </ul>
      </nav>
    </div>

    <footer class="bg-dark text-white text-center py-4">
      <div class="container">
        <p class="mb-0 footer-text">
          &copy; 2026 Пассажирам.РФ. Все права защищены.
        </p>
        <p class="mb-0 footer-small">
          г. Москва, ул. Большая Ордынка, д. 15 | Телефон: +7 (495) 123-45-67
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
